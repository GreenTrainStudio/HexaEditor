<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hex Level Viewer</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: #d9d9d9;
      min-height: 100vh;
    }
    .app-layout {
      display: grid;
      grid-template-columns: minmax(320px, 420px) 1fr;
      min-height: 100vh;
    }
    .ui-panel {
      padding: 12px 16px;
      background: #fff;
      border-right: 1px solid #ccc;
      overflow: auto;
    }
    textarea {
      width: min(1100px, 100%);
      min-height: 160px;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 13px;
      margin-top: 8px;
    }
    button {
      margin-top: 8px;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }
    .error { color: #b00020; font-size: 13px; min-height: 18px; }
    main { padding: 12px; overflow: hidden; cursor: default; position: relative; }
    .color-picker-popup {
      position: absolute;
      background: #fff;
      border: 1px solid #c8c8c8;
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(0,0,0,.12);
      padding: 10px;
      z-index: 10;
      width: 220px;
      display: none;
    }
    .color-picker-popup label { display:block; font-size:12px; margin-top:6px; }
    .color-picker-popup input[type="number"], .color-picker-popup input[type="text"] { width: 62px; }
    .rgb-row { display:flex; gap:6px; }
    main.space-held { cursor: grab; }
    main.dragging { cursor: grabbing; user-select: none; }
    canvas { background: #d9d9d9; display: block; margin: 0; }
  </style>
</head>
<body>
  <div class="app-layout">
    <aside class="ui-panel">
      <div><strong>Визуализатор hex-уровней</strong></div>
      <textarea id="jsonInput"></textarea>
      <br />
      <button id="renderBtn">Отрисовать</button>
      <button id="copyJsonBtn" type="button">Копировать JSON</button>
      <button id="zoomOutBtn" type="button">−</button>
      <button id="zoomInBtn" type="button">+</button>
      <span id="zoomLabel">Масштаб: 100%</span>
      <span id="deleteModeLabel">Режим удаления: выкл (клавиша D)</span>
      <span id="addModeLabel" style="margin-left: 10px;">Режим добавления: выкл (клавиша A)</span>
      <span id="rotateModeLabel" style="margin-left: 10px;">Режим вращения: выкл (клавиша R)</span>
      <span id="colorModeLabel" style="margin-left: 10px;">Режим цвета: выкл (клавиша C)</span>
      <div id="error" class="error"></div>
    </aside>
    <main>
      <canvas id="canvas"></canvas>
      <div id="colorPickerPopup" class="color-picker-popup">
        <label>Палитра RGB <input id="pickerColor" type="color" /></label>
        <label>RGB</label>
        <div class="rgb-row">
          <input id="pickerR" type="number" min="0" max="255" />
          <input id="pickerG" type="number" min="0" max="255" />
          <input id="pickerB" type="number" min="0" max="255" />
        </div>
        <label>HEX <input id="pickerHex" type="text" placeholder="#RRGGBB" /></label>
      </div>
    </main>
  </div>

  <script>
    const sampleLevel = {"Width":7,"Height":6,"Cells":[{"Direction":5,"X":3,"Y":0,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":3,"X":2,"Y":1,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":4,"X":3,"Y":1,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":1,"X":4,"Y":1,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":5,"X":1,"Y":2,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":4,"X":2,"Y":2,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":3,"X":3,"Y":2,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":3,"X":4,"Y":2,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":4,"X":5,"Y":2,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":5,"X":0,"Y":3,"Color":{"r":255,"g":128,"b":15,"a":255}},{"Direction":3,"X":1,"Y":3,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":0,"X":2,"Y":3,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":0,"X":3,"Y":3,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":5,"X":4,"Y":3,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":5,"X":5,"Y":3,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":5,"X":6,"Y":3,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":5,"X":0,"Y":4,"Color":{"r":255,"g":128,"b":15,"a":255}},{"Direction":4,"X":1,"Y":4,"Color":{"r":255,"g":128,"b":15,"a":255}},{"Direction":0,"X":2,"Y":4,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":4,"X":3,"Y":4,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":5,"X":4,"Y":4,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":2,"X":5,"Y":4,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":2,"X":6,"Y":4,"Color":{"r":222,"g":31,"b":30,"a":255}},{"Direction":3,"X":1,"Y":5,"Color":{"r":255,"g":128,"b":15,"a":255}},{"Direction":5,"X":2,"Y":5,"Color":{"r":255,"g":128,"b":15,"a":255}},{"Direction":3,"X":4,"Y":5,"Color":{"r":255,"g":43,"b":44,"a":255}},{"Direction":5,"X":5,"Y":5,"Color":{"r":255,"g":43,"b":44,"a":255}}]};

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const input = document.getElementById('jsonInput');
    const error = document.getElementById('error');
    const renderBtn = document.getElementById('renderBtn');
    const copyJsonBtn = document.getElementById('copyJsonBtn');
    const zoomInBtn = document.getElementById('zoomInBtn');
    const zoomOutBtn = document.getElementById('zoomOutBtn');
    const zoomLabel = document.getElementById('zoomLabel');
    const deleteModeLabel = document.getElementById('deleteModeLabel');
    const addModeLabel = document.getElementById('addModeLabel');
    const rotateModeLabel = document.getElementById('rotateModeLabel');
    const colorModeLabel = document.getElementById('colorModeLabel');
    const colorPickerPopup = document.getElementById('colorPickerPopup');
    const pickerColor = document.getElementById('pickerColor');
    const pickerR = document.getElementById('pickerR');
    const pickerG = document.getElementById('pickerG');
    const pickerB = document.getElementById('pickerB');
    const pickerHex = document.getElementById('pickerHex');
    const viewport = document.querySelector('main');

    input.value = JSON.stringify(sampleLevel, null, 2);

    const HEX_SIZE = 38;
    const SQRT3 = Math.sqrt(3);
    // Flat-top hex geometry
    const HEX_WIDTH = 2 * HEX_SIZE;
    const HEX_HEIGHT = SQRT3 * HEX_SIZE;
    const HORIZ_STEP = 1.5 * HEX_SIZE;

    function rgba(c) {
      return `rgba(${c.r}, ${c.g}, ${c.b}, ${(c.a ?? 255) / 255})`;
    }

    function hexCenter(x, y) {
      // Game coordinates: (0,0) is bottom-left, Y grows upward.
      const cx = x * HORIZ_STEP;
      const cy = y * HEX_HEIGHT + ((x % 2) ? HEX_HEIGHT / 2 : 0);
      return { x: cx, y: cy };
    }

    function drawHex(cx, cy, size, fill) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const angle = (Math.PI / 180) * (60 * i);
        const px = cx + size * Math.cos(angle);
        const py = cy + size * Math.sin(angle);
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = fill;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,.25)';
      ctx.lineWidth = 1.2;
      ctx.stroke();
    }

    function drawArrow(cx, cy, dir) {
      // 0=Up (0°), 1=UpRight, 2=DownRight, 3=Down, 4=DownLeft, 5=UpLeft
      const directionAngles = [0, 45, 135, 180, 225, 315];
      const angle = (directionAngles[((dir % 6) + 6) % 6]) * Math.PI / 180;
      const len = HEX_SIZE * 0.55;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(angle);

      ctx.beginPath();
      ctx.moveTo(0, -len * 0.55);
      ctx.lineTo(len * 0.22, len * 0.05);
      ctx.lineTo(len * 0.08, len * 0.05);
      ctx.lineTo(len * 0.08, len * 0.50);
      ctx.lineTo(-len * 0.08, len * 0.50);
      ctx.lineTo(-len * 0.08, len * 0.05);
      ctx.lineTo(-len * 0.22, len * 0.05);
      ctx.closePath();

      ctx.fillStyle = '#f2f2f2';
      ctx.strokeStyle = '#8a8a8a';
      ctx.lineWidth = 2;
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }

    function render(level) {
      const centers = level.Cells.map(c => ({ ...c, center: hexCenter(c.X, c.Y) }));
      const minX = Math.min(...centers.map(c => c.center.x));
      const minY = Math.min(...centers.map(c => c.center.y));
      const maxX = Math.max(...centers.map(c => c.center.x));
      const maxY = Math.max(...centers.map(c => c.center.y));

      const pad = HEX_SIZE + 20;
      canvas.width = Math.ceil((maxX - minX) + pad * 2 + HEX_WIDTH);
      canvas.height = Math.ceil((maxY - minY) + pad * 2 + HEX_HEIGHT);
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      centers.forEach(c => {
        const cx = c.center.x - minX + pad;
        const cy = (maxY - c.center.y) + pad;
        drawHex(cx, cy, HEX_SIZE, rgba(c.Color));
        drawArrow(cx, cy, c.Direction ?? 0);
      });
    }

    function safeRender() {
      try {
        error.textContent = '';
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) {
          throw new Error('В JSON отсутствует массив Cells.');
        }
        render(level);
      } catch (e) {
        error.textContent = `Ошибка: ${e.message}`;
      }
    }

    function writeLevel(level) {
      input.value = JSON.stringify(level, null, 2);
    }

    async function copyJsonToClipboard() {
      const jsonText = input.value;
      if (!jsonText.trim()) {
        error.textContent = 'Ошибка: JSON пустой, нечего копировать.';
        return;
      }
      try {
        if (navigator.clipboard?.writeText) {
          await navigator.clipboard.writeText(jsonText);
        } else {
          input.focus();
          input.select();
          const ok = document.execCommand('copy');
          input.setSelectionRange(input.value.length, input.value.length);
          if (!ok) throw new Error('copy command failed');
        }
        error.textContent = 'JSON скопирован в буфер обмена.';
      } catch {
        error.textContent = 'Ошибка: не удалось скопировать JSON.';
      }
    }

    function updateZoomLabel() {
      zoomLabel.textContent = `Масштаб: ${Math.round(currentZoom * 100)}%`;
    }

    let currentZoom = 1;
    let panX = 0;
    let panY = 0;
    const ZOOM_STEP = 0.1;
    const MIN_ZOOM = 0.5;
    const MAX_ZOOM = 2.5;

    function applyZoom() {
      canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${currentZoom})`;
      canvas.style.transformOrigin = 'top left';
      updateZoomLabel();
    }

    function setZoom(nextZoom, anchorX = 0, anchorY = 0) {
      const clampedZoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, nextZoom));
      if (clampedZoom === currentZoom) return;

      const worldX = (anchorX - panX) / currentZoom;
      const worldY = (anchorY - panY) / currentZoom;
      currentZoom = Number(clampedZoom.toFixed(2));
      panX = anchorX - (worldX * currentZoom);
      panY = anchorY - (worldY * currentZoom);
      applyZoom();
    }

    function changeZoom(delta, anchorX = 0, anchorY = 0) {
      setZoom(currentZoom + delta, anchorX, anchorY);
    }

    function handleWheelZoom(event) {
      event.preventDefault();
      const wheelDirection = event.deltaY < 0 ? 1 : -1;
      const rect = viewport.getBoundingClientRect();
      const anchorX = event.clientX - rect.left;
      const anchorY = event.clientY - rect.top;
      changeZoom(wheelDirection * ZOOM_STEP, anchorX, anchorY);
    }

    let isDragging = false;
    let isSpacePressed = false;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartPanX = 0;
    let dragStartPanY = 0;

    function startDrag(event) {
      if (!isSpacePressed || event.button !== 0) return;
      isDragging = true;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartPanX = panX;
      dragStartPanY = panY;
      viewport.classList.add('dragging');
      event.preventDefault();
    }

    function moveDrag(event) {
      if (!isDragging) return;
      const dx = event.clientX - dragStartX;
      const dy = event.clientY - dragStartY;
      panX = dragStartPanX + dx;
      panY = dragStartPanY + dy;
      applyZoom();
    }

    function stopDrag() {
      isDragging = false;
      viewport.classList.remove('dragging');
    }

    function updatePanModeVisual() {
      viewport.classList.toggle('space-held', isSpacePressed && !isDragging);
    }

    let isDeleteMode = false;
    let isAddMode = false;
    let isRotateMode = false;
    let isColorMode = false;
    let activeColorCell = null;
    const undoStack = [];

    function setExclusiveMode(mode) {
      const nextState = {
        delete: mode === 'delete' ? !isDeleteMode : false,
        add: mode === 'add' ? !isAddMode : false,
        rotate: mode === 'rotate' ? !isRotateMode : false,
        color: mode === 'color' ? !isColorMode : false,
      };

      isDeleteMode = nextState.delete;
      isAddMode = nextState.add;
      isRotateMode = nextState.rotate;
      isColorMode = nextState.color;

      if (!isColorMode) hideColorPicker();

      updateDeleteModeLabel();
      updateAddModeLabel();
      updateRotateModeLabel();
      updateColorModeLabel();
    }

    function updateDeleteModeLabel() {
      deleteModeLabel.textContent = `Режим удаления: ${isDeleteMode ? 'вкл' : 'выкл'} (клавиша D)`;
      deleteModeLabel.style.color = isDeleteMode ? '#b00020' : '';
      deleteModeLabel.style.fontWeight = isDeleteMode ? '700' : '400';
    }

    function getCellByCanvasPoint(clientX, clientY, level) {
      const rect = viewport.getBoundingClientRect();
      const px = (clientX - rect.left - panX) / currentZoom;
      const py = (clientY - rect.top - panY) / currentZoom;
      const centers = level.Cells.map(c => ({ ...c, center: hexCenter(c.X, c.Y) }));
      const minX = Math.min(...centers.map(c => c.center.x));
      const maxY = Math.max(...centers.map(c => c.center.y));
      const pad = HEX_SIZE + 20;
      for (const cell of level.Cells) {
        const world = hexCenter(cell.X, cell.Y);
        const cx = world.x - minX + pad;
        const cy = (maxY - world.y) + pad;
        const dx = px - cx;
        const dy = py - cy;
        if ((dx * dx + dy * dy) <= HEX_SIZE * HEX_SIZE) {
          return cell;
        }
      }
      return null;
    }

    function getLevelBounds(level) {
      const centers = level.Cells.map(c => ({ ...c, center: hexCenter(c.X, c.Y) }));
      const minX = Math.min(...centers.map(c => c.center.x));
      const maxY = Math.max(...centers.map(c => c.center.y));
      return { minX, maxY, pad: HEX_SIZE + 20 };
    }

    function pointToGrid(clientX, clientY, level) {
      if (!Array.isArray(level.Cells) || level.Cells.length === 0) return null;
      const rect = viewport.getBoundingClientRect();
      const px = (clientX - rect.left - panX) / currentZoom;
      const py = (clientY - rect.top - panY) / currentZoom;
      const { minX, maxY, pad } = getLevelBounds(level);
      const worldX = px + minX - pad;
      const worldY = maxY - (py - pad);

      const approxX = Math.round(worldX / HORIZ_STEP);
      const approxY = Math.round(worldY / HEX_HEIGHT);

      let best = null;
      let bestDist = Infinity;
      for (let x = approxX - 2; x <= approxX + 2; x++) {
        for (let y = approxY - 2; y <= approxY + 2; y++) {
          const center = hexCenter(x, y);
          const dx = worldX - center.x;
          const dy = worldY - center.y;
          const dist = dx * dx + dy * dy;
          if (dist < bestDist) {
            bestDist = dist;
            best = { X: x, Y: y };
          }
        }
      }
      return bestDist <= HEX_SIZE * HEX_SIZE * 1.2 ? best : null;
    }

    function getNeighborColor(level, x, y) {
      const offsetsEven = [[1,0],[-1,0],[0,1],[0,-1],[-1,1],[-1,-1]];
      const offsetsOdd = [[1,0],[-1,0],[0,1],[0,-1],[1,1],[1,-1]];
      const offsets = (x % 2 === 0) ? offsetsEven : offsetsOdd;
      const neighbors = [];
      for (const [dx, dy] of offsets) {
        const n = level.Cells.find(c => c.X === x + dx && c.Y === y + dy && c.Color);
        if (n?.Color) neighbors.push(n.Color);
      }
      if (neighbors.length === 0) {
        return { r: 180, g: 180, b: 180, a: 255 };
      }
      const sum = neighbors.reduce((acc, c) => ({
        r: acc.r + (c.r ?? 0),
        g: acc.g + (c.g ?? 0),
        b: acc.b + (c.b ?? 0),
        a: acc.a + (c.a ?? 255)
      }), { r: 0, g: 0, b: 0, a: 0 });
      return {
        r: Math.round(sum.r / neighbors.length),
        g: Math.round(sum.g / neighbors.length),
        b: Math.round(sum.b / neighbors.length),
        a: Math.round(sum.a / neighbors.length),
      };
    }

    function deleteCellAt(clientX, clientY) {
      try {
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) return;
        const target = getCellByCanvasPoint(clientX, clientY, level);
        if (!target) return;
        undoStack.push(JSON.stringify(level));
        const index = level.Cells.findIndex(c =>
          c.X === target.X &&
          c.Y === target.Y &&
          (c.Direction ?? 0) === (target.Direction ?? 0) &&
          JSON.stringify(c.Color ?? {}) === JSON.stringify(target.Color ?? {})
        );
        if (index < 0) return;
        level.Cells.splice(index, 1);
        writeLevel(level);
        safeRender();
      } catch {
        // Ignore invalid JSON while editing.
      }
    }

    function updateAddModeLabel() {
      addModeLabel.textContent = `Режим добавления: ${isAddMode ? 'вкл' : 'выкл'} (клавиша A)`;
      addModeLabel.style.color = isAddMode ? '#006400' : '';
      addModeLabel.style.fontWeight = isAddMode ? '700' : '400';
    }

    function updateRotateModeLabel() {
      rotateModeLabel.textContent = `Режим вращения: ${isRotateMode ? 'вкл' : 'выкл'} (клавиша R)`;
      rotateModeLabel.style.color = isRotateMode ? '#003a8c' : '';
      rotateModeLabel.style.fontWeight = isRotateMode ? '700' : '400';
    }

    function rotateCellAt(clientX, clientY) {
      try {
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) return;
        const target = getCellByCanvasPoint(clientX, clientY, level);
        if (!target) return;
        const index = level.Cells.findIndex(c => c.X === target.X && c.Y === target.Y);
        if (index < 0) return;
        undoStack.push(JSON.stringify(level));
        const currentDirection = Number(level.Cells[index].Direction ?? 0);
        level.Cells[index].Direction = ((currentDirection % 6) + 1) % 6;
        writeLevel(level);
        safeRender();
      } catch {
        // Ignore invalid JSON while editing.
      }
    }

    function addCellAt(clientX, clientY) {
      try {
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) return;
        const target = pointToGrid(clientX, clientY, level);
        if (!target) return;
        if (level.Cells.some(c => c.X === target.X && c.Y === target.Y)) return;

        undoStack.push(JSON.stringify(level));
        const color = getNeighborColor(level, target.X, target.Y);
        level.Cells.push({
          Direction: 0,
          X: target.X,
          Y: target.Y,
          Color: color
        });

        if (typeof level.Width !== 'number') level.Width = 0;
        if (typeof level.Height !== 'number') level.Height = 0;
        if (target.X >= level.Width) level.Width = target.X + 1;
        if (target.Y >= level.Height) level.Height = target.Y + 1;

        writeLevel(level);
        safeRender();
      } catch {
        // Ignore invalid JSON while editing.
      }
    }


    function updateColorModeLabel() {
      colorModeLabel.textContent = `Режим цвета: ${isColorMode ? 'вкл' : 'выкл'} (клавиша C)`;
      colorModeLabel.style.color = isColorMode ? '#7a2cff' : '';
      colorModeLabel.style.fontWeight = isColorMode ? '700' : '400';
    }

    function rgbToHex(r, g, b) {
      return '#' + [r, g, b].map(v => Number(v).toString(16).padStart(2, '0')).join('').toUpperCase();
    }

    function hexToRgb(hex) {
      const cleaned = hex.trim().replace('#', '');
      if (!/^[0-9a-fA-F]{6}$/.test(cleaned)) return null;
      return {
        r: parseInt(cleaned.slice(0, 2), 16),
        g: parseInt(cleaned.slice(2, 4), 16),
        b: parseInt(cleaned.slice(4, 6), 16),
      };
    }

    function hideColorPicker() {
      colorPickerPopup.style.display = 'none';
      activeColorCell = null;
    }

    function setPickerValues(color) {
      pickerColor.value = rgbToHex(color.r, color.g, color.b);
      pickerR.value = color.r;
      pickerG.value = color.g;
      pickerB.value = color.b;
      pickerHex.value = rgbToHex(color.r, color.g, color.b);
    }

    function applyColorToActiveCell(color) {
      if (!activeColorCell) return;
      try {
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) return;
        const cell = level.Cells.find(c => c.X === activeColorCell.X && c.Y === activeColorCell.Y);
        if (!cell) return;
        cell.Color = { r: color.r, g: color.g, b: color.b, a: cell.Color?.a ?? 255 };
        writeLevel(level);
        safeRender();
      } catch {}
    }

    function openColorPickerForCell(clientX, clientY) {
      try {
        const level = JSON.parse(input.value);
        if (!Array.isArray(level.Cells)) return;
        const cell = getCellByCanvasPoint(clientX, clientY, level);
        if (!cell) return;
        undoStack.push(JSON.stringify(level));
        activeColorCell = { X: cell.X, Y: cell.Y };
        const color = cell.Color ?? { r: 180, g: 180, b: 180, a: 255 };
        setPickerValues(color);
        const rect = viewport.getBoundingClientRect();
        colorPickerPopup.style.left = `${Math.min(clientX - rect.left + 12, rect.width - 230)}px`;
        colorPickerPopup.style.top = `${Math.min(clientY - rect.top + 12, rect.height - 170)}px`;
        colorPickerPopup.style.display = 'block';
      } catch {}
    }

    window.addEventListener('keydown', (event) => {
      if (event.code === 'KeyD' && !event.repeat && !event.ctrlKey && !event.metaKey && !event.altKey) {
        setExclusiveMode('delete');
        event.preventDefault();
        return;
      }
      if (event.code === 'KeyA' && !event.repeat && !event.ctrlKey && !event.metaKey && !event.altKey) {
        setExclusiveMode('add');
        event.preventDefault();
        return;
      }
      if (event.code === 'KeyR' && !event.repeat && !event.ctrlKey && !event.metaKey && !event.altKey) {
        setExclusiveMode('rotate');
        event.preventDefault();
        return;
      }
      if (event.code === 'KeyC' && !event.repeat && !event.ctrlKey && !event.metaKey && !event.altKey) {
        setExclusiveMode('color');
        event.preventDefault();
        return;
      }

      if ((event.ctrlKey || event.metaKey) && event.code === 'KeyZ') {
        const previous = undoStack.pop();
        if (previous) {
          input.value = previous;
          safeRender();
        }
        event.preventDefault();
        return;
      }

      if (event.code !== 'Space') return;
      if (!isSpacePressed) {
        isSpacePressed = true;
        updatePanModeVisual();
      }
      event.preventDefault();
    });

    window.addEventListener('keyup', (event) => {
      if (event.code !== 'Space') return;
      isSpacePressed = false;
      stopDrag();
      updatePanModeVisual();
      event.preventDefault();
    });

    renderBtn.addEventListener('click', safeRender);
    copyJsonBtn.addEventListener('click', copyJsonToClipboard);
    zoomInBtn.addEventListener('click', () => changeZoom(ZOOM_STEP, viewport.clientWidth / 2, viewport.clientHeight / 2));
    zoomOutBtn.addEventListener('click', () => changeZoom(-ZOOM_STEP, viewport.clientWidth / 2, viewport.clientHeight / 2));
    viewport.addEventListener('mousedown', startDrag);
    canvas.addEventListener('click', (event) => {
      if (isSpacePressed || isDragging) return;
      if (isRotateMode) {
        rotateCellAt(event.clientX, event.clientY);
        return;
      }
      if (isAddMode) {
        addCellAt(event.clientX, event.clientY);
        return;
      }
      if (isColorMode) {
        openColorPickerForCell(event.clientX, event.clientY);
        return;
      }
      if (!isDeleteMode) return;
      deleteCellAt(event.clientX, event.clientY);
    });
    viewport.addEventListener('wheel', handleWheelZoom, { passive: false });
    window.addEventListener('mousemove', moveDrag);
    window.addEventListener('mouseup', stopDrag);
    window.addEventListener('blur', () => {
      isSpacePressed = false;
      stopDrag();
      updatePanModeVisual();
    });
    updateDeleteModeLabel();
    updateAddModeLabel();
    updateRotateModeLabel();
    updateColorModeLabel();

    pickerColor.addEventListener('input', () => {
      const rgb = hexToRgb(pickerColor.value);
      if (!rgb) return;
      setPickerValues(rgb);
      applyColorToActiveCell(rgb);
    });

    [pickerR, pickerG, pickerB].forEach(inputEl => inputEl.addEventListener('input', () => {
      const color = {
        r: Math.max(0, Math.min(255, Number(pickerR.value || 0))),
        g: Math.max(0, Math.min(255, Number(pickerG.value || 0))),
        b: Math.max(0, Math.min(255, Number(pickerB.value || 0))),
      };
      setPickerValues(color);
      applyColorToActiveCell(color);
    }));

    pickerHex.addEventListener('change', () => {
      const rgb = hexToRgb(pickerHex.value);
      if (!rgb) return;
      setPickerValues(rgb);
      applyColorToActiveCell(rgb);
    });

    viewport.addEventListener('mousedown', (event) => {
      if (colorPickerPopup.style.display === 'block' && !colorPickerPopup.contains(event.target)) hideColorPicker();
    });

    applyZoom();
    safeRender();
  </script>
</body>
</html>
